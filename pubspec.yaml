name: ricardo
description: "This is the Ride Sharing Application"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <5.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get:
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  pinput: ^6.0.1
  flutter_spinkit: ^5.2.2
  cached_network_image: ^3.4.1
  audioplayers: ^6.5.1
  timeago: ^3.7.1
  image_picker: ^1.2.1
  smooth_page_indicator: ^1.2.0+3
  dots_indicator: ^3.0.0
  dotted_border: ^2.1.0
  google_maps_flutter: ^2.14.0
  flutter_intl_phone_field: ^0.0.7
  lottie: ^2.4.0
  logger: ^2.6.2
  mime_type: ^1.0.1
  shared_preferences:
  intl: ^0.20.2
  socket_io_client: ^3.1.4
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner:
  flutter_gen_runner:


  # The "flutter_lints" package below contains a set of recommended lints to
